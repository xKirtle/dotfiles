# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hyprland.org/Configuring/Window-Rules/ #

# Float Necessary Windows
windowrule = float, class:^()$,title:^(Picture in picture)$
windowrule = float, class:^()$,title:^(Save File)$
windowrule = float, class:^()$,title:^(Open File)$
windowrule = float, class:^(LibreWolf)$,title:^(Picture-in-Picture)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, class:^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
windowrule = float, class:^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$
windowrule = float, class:^(CachyOSHello)$
windowrule = float, class:^(zenity)$
windowrule = float, class:^()$,title:^(Steam - Self Updater)$
# Increase the opacity
windowrule = opacity 0.92, class:^(thunar|nemo)$
windowrule = opacity 0.96, class:^(discord|armcord|webcord)$
windowrule = opacity 0.95, title:^(QQ|Telegram)$
windowrule = opacity 0.95, title:^(NetEase Cloud Music Gtk4)$
# General window rules
windowrule = float, title:^(Picture-in-Picture)$
windowrule = size 960 540, title:^(Picture-in-Picture)$
windowrule = move 25%-, title:^(Picture-in-Picture)$
windowrule = float, title:^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrule = move 25%-, title:^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrule = size 960 540, title:^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
windowrule = pin, title:^(danmufloat)$
windowrule = rounding 5, title:^(danmufloat|termfloat)$
windowrule = animation slide right, class:^(kitty|Alacritty)$
windowrule = noblur, class:^(org.mozilla.firefox)$
# Decorations related to floating windows on workspaces 1 to 10
windowrule = bordersize 2, floating:1, onworkspace:w[fv1-10]
windowrule = bordercolor $cachylblue, floating:1, onworkspace:w[fv1-10]
windowrule = rounding 8, floating:1, onworkspace:w[fv1-10]
# Decorations related to tiling windows on workspaces 1 to 10
windowrule = bordersize 3, floating:0, onworkspace:f[1-10]
windowrule = rounding 4, floating:0, onworkspace:f[1-10]
# Windows Rules End #

# Workspaces Rules https://wiki.hyprland.org/Configuring/Workspace-Rules/ #
workspace = name:"1\u200B \u200C", monitor:DP-1, default:true
workspace = name:"1\u200D \u2060", monitor:DP-2
# Workspaces Rules End #

# Layers Rules #
layerrule = animation slide top, logout_dialog
# layerrule = animation popin 50%, waybar
layerrule = animation slide down, waybar
layerrule = animation fade 50%, wallpaper
# Layers Rules End #

# ---- Mine ----

# Network Manager Connection Editor — float + size + TOP‑RIGHT (20px padding)
windowrule = float, initialClass: nm-connection-editor
windowrule = size 800 600, initialClass: nm-connection-editor
windowrule = pin, initialClass: nm-connection-editor
windowrule = move 100%-w-20 60, initialClass: nm-connection-editor

# Blueman manager
windowrule = float, class: blueman-manager
windowrule = size 800 600, class: blueman-manager
windowrule = pin, class: blueman-manager
windowrule = move 100%-w-20 60, class: blueman-manager

# Pavucontrol
windowrule = float, class: (.*org.pulseaudio.pavucontrol.*)
windowrule = size 800 600, class: (.*org.pulseaudio.pavucontrol.*)
windowrule = pin, class: (.*org.pulseaudio.pavucontrol.*)
windowrule = move 100%-w-20 60, class: (.*org.pulseaudio.pavucontrol.*)

# SwayNC
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window
layerrule = ignorealpha 0.5, swaync-control-center
layerrule = ignorealpha 0.5, swaync-notification-window

# nwg-look
windowrule = float,class:(nwg-look)
windowrule = size 700 600, class: (nwg-look)
windowrule = center, class: (nwg-look)
windowrule = pin, class: (nwg-look)

# Thunar
windowrule = float, initialClass: thunar, title: ^(Rename.*)
windowrule = size 20% 5%, initialClass: thunar, title: ^(Rename.*)
windowrule = pin, initialClass: thunar, title: ^(Rename.*)

# Steam
windowrule = float, class:steam, title: Friends List
windowrule = size 400 600, class:steam, title: Friends List
windowrule = center, class:steam, title: Friends List
windowrule = float, class:steam, title: Steam Settings
windowrule = center, class:steam, title: Steam Settings
windowrule = float, class:steam, title: Sign in to Steam
windowrule = center, class:steam, title: Sign in to Steam
windowrule = fullscreen, class:steam_app_.*

# General Apps
windowrule = monitor DP-2, class:discord
windowrule = monitor DP-2, class:Spotify
windowrule = idleinhibit maximize, class:.*
windowrule = idleinhibit fullscreen, class:.*