
# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                         Keybinds                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

# https://wiki.hyprland.org/Configuring/Binds/
# Applications
bind = $mainMod, RETURN, exec, kitty # Open the terminal
bind = $mainMod, B, exec, firefox # Open the browser
bind = $mainMod, E, exec, thunar # Open the filemanager
bind = $mainMod SHIFT, V, exec, flatpak run dev.krtirtho.Flemozi # Open the emoji picker
bind = $mainMod CTRL, C, exec, gnome-calculator # Open the calculator
bind = $mainMod, SPACE, exec, $applauncher # Open application launcher
bind = $mainMod, V, exec, ~/dotfiles/go-scripts/multi-tool clip-history # Open clipboard manager
bind = $mainMod SHIFT, V, exec, flatpak run dev.krtirtho.Flemozi # Open the emoji picker
bind = $mainMod SHIFT, B, exec, pkill waybar && waybar & # Restart waybar

# Display
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Increase display zoom
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Decrease display zoom
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 0 # Reset display zoom

# Windows
bind = $mainMod, Q, killactive # Kill active window
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Quit active window and all open instances
bind = $mainMod, F, fullscreen, 0 # Set active window to fullscreen
bind = $mainMod, M, fullscreen, 1 # Maximize Window
bind = $mainMod, T, togglefloating # Toggle active windows into floating mode
bind = $mainMod SHIFT, T, workspaceopt, allfloat # Toggle all windows into floating mode
bind = $mainMod, J, togglesplit # Toggle split
bind = $mainMod, P, pseudo # Toggle dwindle pseudo mode
bindm = $mainMod, mouse:272, movewindow # Move window with the mouse
bindm = $mainMod, mouse:273, resizewindow # Resize window with the mouse
bind = $mainMod, left, movefocus, l # Move focus left
bind = $mainMod, right, movefocus, r # Move focus right
bind = $mainMod, up, movefocus, u # Move focus up
bind = $mainMod, down, movefocus, d # Move focus down
bind = $mainMod SHIFT, right, resizeactive, 100 0 # Increase window width with keyboard
bind = $mainMod SHIFT, left, resizeactive, -100 0 # Reduce window width with keyboard
bind = $mainMod SHIFT, down, resizeactive, 0 100 # Increase window height with keyboard
bind = $mainMod SHIFT, up, resizeactive, 0 -100 # Reduce window height with keyboard
bind = $mainMod CTRL, right, moveactive, 100 0 # Move window right with keyboard
bind = $mainMod CTRL, left, moveactive, -100 0 # Move window left with keyboard
bind = $mainMod CTRL, down, moveactive, 0 100 # Move window down with keyboard
bind = $mainMod CTRL, up, moveactive, 0 -100 # Move window up with keyboard
bind = $mainMod, G, togglegroup # Toggle window group
bind = $mainMod, K, swapsplit # Swapsplit
bind = $mainMod ALT, left, swapwindow, l # Swap tiled window left
bind = $mainMod ALT, right, swapwindow, r # Swap tiled window right
bind = $mainMod ALT, up, swapwindow, u # Swap tiled window up
bind = $mainMod ALT, down, swapwindow, d # Swap tiled window down
binde = ALT,Tab,cyclenext # Cycle between windows
binde = ALT,Tab,bringactivetotop # Bring active window to the top

bind = , Print, exec, $shot-region # Creates a screenshot of an area
bind = CTRL, Print, exec, $shot-window # Creates a screenshot of the active window
bind = ALT, Print, exec, $shot-screen # Creates a screenshot of the active display

bind = , XF86AudioPlay, exec, playerctl play-pause # Audio play pause
bind = , XF86AudioPause, exec, playerctl pause  # Audio pause
bind = , XF86AudioNext, exec, playerctl next # Audio next
bind = , XF86AudioPrev, exec, playerctl previous # Audio previouss

# https://github.com/ErikReider/SwayOSD

# Output Volume
bind = ,XF86AudioRaiseVolume, exec,swayosd-client --output-volume raise --max-volume 100
bind = ,XF86AudioLowerVolume, exec,swayosd-client --output-volume lower --max-volume 100
bind = ,XF86AudioMute, exec,swayosd-client --output-volume mute-toggle
bind = $mainMod, ESCAPE, exec, ~/dotfiles/go-scripts/multi-tool cycle-audio-sink next # Cycle audio sinks

# Input Volume
bind = $mainMod, XF86AudioRaiseVolume, exec, swayosd-client --input-volume raise --max-volume 100
bind = $mainMod, XF86AudioLowerVolume, exec, swayosd-client --input-volume lower --max-volume 100
bind = $mainMod, XF86AudioMute, exec, swayosd-client --input-volume mute-toggle

bind = CAPS, Caps_Lock, exec, swayosd-client --caps-lock

# ======= Window Actions =======

## Move window towards a direction
bindd = $mainMod SHIFT, left, Move active window to the left, movewindow, l
bindd = $mainMod SHIFT, right, Move active window to the right, movewindow, r
bindd = $mainMod SHIFT, up, Move active window upwards, movewindow, u
bindd = $mainMod SHIFT, down, Move active window downwards, movewindow, d
## Move focus with mainMod + arrow keys
bindd = $mainMod, left, Move focus to the left, movefocus, l
bindd = $mainMod, right,  Move focus to the right, movefocus, r
bindd = $mainMod, up, Move focus upwards, movefocus, u
bindd = $mainMod, down, Move focus downwards, movefocus, d

# Cycle existing workspaces on focused monitor
bind = $mainMod, Tab, exec, ~/dotfiles/go-scripts/workspace cycle up
bind = $mainMod SHIFT, Tab, exec, ~/dotfiles/go-scripts/workspace cycle down

# Switch workspaces relative to active monitor
bind = $mainMod, 1, exec, ~/dotfiles/go-scripts/workspace goto 1
bind = $mainMod, 2, exec, ~/dotfiles/go-scripts/workspace goto 2
bind = $mainMod, 3, exec, ~/dotfiles/go-scripts/workspace goto 3
bind = $mainMod, 4, exec, ~/dotfiles/go-scripts/workspace goto 4
bind = $mainMod, 5, exec, ~/dotfiles/go-scripts/workspace goto 5
bind = $mainMod, 6, exec, ~/dotfiles/go-scripts/workspace goto 6
bind = $mainMod, 7, exec, ~/dotfiles/go-scripts/workspace goto 7
bind = $mainMod, 8, exec, ~/dotfiles/go-scripts/workspace goto 8
bind = $mainMod, 9, exec, ~/dotfiles/go-scripts/workspace goto 9

# Move active window to a workspace relative to active monitor
bind = $mainMod SHIFT, 1, exec, ~/dotfiles/go-scripts/workspace move 1
bind = $mainMod SHIFT, 2, exec, ~/dotfiles/go-scripts/workspace move 2
bind = $mainMod SHIFT, 3, exec, ~/dotfiles/go-scripts/workspace move 3
bind = $mainMod SHIFT, 4, exec, ~/dotfiles/go-scripts/workspace move 4
bind = $mainMod SHIFT, 5, exec, ~/dotfiles/go-scripts/workspace move 5
bind = $mainMod SHIFT, 6, exec, ~/dotfiles/go-scripts/workspace move 6
bind = $mainMod SHIFT, 7, exec, ~/dotfiles/go-scripts/workspace move 7
bind = $mainMod SHIFT, 8, exec, ~/dotfiles/go-scripts/workspace move 8
bind = $mainMod SHIFT, 9, exec, ~/dotfiles/go-scripts/workspace move 9

# Move all windows of active workspace to a workspace relative to active monitor
bind = $mainMod CTRL, 1, exec, ~/dotfiles/go-scripts/workspace move --all 1
bind = $mainMod CTRL, 2, exec, ~/dotfiles/go-scripts/workspace move --all 2
bind = $mainMod CTRL, 3, exec, ~/dotfiles/go-scripts/workspace move --all 3
bind = $mainMod CTRL, 4, exec, ~/dotfiles/go-scripts/workspace move --all 4
bind = $mainMod CTRL, 5, exec, ~/dotfiles/go-scripts/workspace move --all 5
bind = $mainMod CTRL, 6, exec, ~/dotfiles/go-scripts/workspace move --all 6
bind = $mainMod CTRL, 7, exec, ~/dotfiles/go-scripts/workspace move --all 7
bind = $mainMod CTRL, 8, exec, ~/dotfiles/go-scripts/workspace move --all 8
bind = $mainMod CTRL, 9, exec, ~/dotfiles/go-scripts/workspace move --all 9

# ======= Additional Settings =======

# https://wiki.hyprland.org/Configuring/Binds
binds {
    allow_workspace_cycles = 1
    workspace_back_and_forth = 1
    workspace_center_on = 1
	movefocus_cycles_fullscreen = true
	window_direction_monitor_fallback = true
}
