# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Autostart Configuration                  ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

# Autostart wiki https://wiki.hyprland.org/Configuring/Keywords/#executing

# exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_RUNTIME_DIR

# Set wallpaper in Wayland compositor
exec-once = swaybg -o \* -i /usr/share/wallpapers/cachyos-wallpapers/Skyscraper.png -m fill

# Status Bar
exec-once = waybar &

# Input Method in daemon (-d) mode
exec-once = fcitx5 -d &

# Notification Center
exec-once = swaync &

# SwayOSD for volume overlay
exec-once = swayosd-server &

# Network Manager Applet
exec-once = nm-applet --indicator &

# Scale hyprland monitor automatically depending on resolution of dual-mode display (4k@240 or 1080p@480)
exec-once = ~/.config/ml4w/scripts/monitor-scale-watcher.sh &

# Authentication Dialogs
exec-once = /usr/lib/polkit-kde-authentication-agent-1 &

# Slow app launch fix
exec-once = systemctl --user import-environment
exec-once = hash dbus-update-activation-environment 2>/dev/null
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland

# Idle configuration
exec-once = swayidle -w timeout 300 'swaylock -f -c 000000' before-sleep 'swaylock -f -c 000000'

# Load clipboard history watcher
exec-once = wl-paste --watch cliphist store &

# Spawn and pin the per-monitor "1" workspaces with reversed invisibles
exec-once = bash -lc '~/.config/hypr/scripts/workspace-init.sh "LG Electronics LG ULTRAGEAR+ 411NTTQ06481" "LG Electronics LG ULTRAGEAR 310NTCZ6H379"'

# Apps
# exec-once = ~/.config/ml4w/scripts/run-when.sh --days "Mon..Fri" --start 08:00 --end 17:00 -- gtk-launch microsoft-teams &
# exec-once = ~/.config/ml4w/scripts/run-when.sh --days "Mon..Fri" --start 08:00 --end 17:00 -- gtk-launch outlook &
exec-once = steam -forcedesktopscaling 1.5 -silent &
exec-once = discord --start-minimized &