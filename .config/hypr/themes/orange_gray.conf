# Theme: Orange + Gray (with variables)

$bg              = rgba(1e1e1eff)  # dark gray background
$fg              = rgba(dcdcdcff)  # light gray foreground
$accent          = rgba(fca311ff)  # bright orange
$accent_dark     = rgba(b96c00ff)  # dark orange
$border          = rgba(3a3a3aff)  # mid gray
$inactive        = rgba(2a2a2aff)  # darker gray
$shadow          = rgba(00000088)  # drop shadow
$selection       = rgba(fca31144)  # semi-transparent orange
$error           = rgba(ff5555ff)  # error red
$transparent     = rgba(00000000)
