# Locks at 180s, then DPMS off at 182s. Any activity restores DPMS.
general {
  before_sleep_cmd = hyprlock
  after_sleep_cmd  = hyprctl dispatch dpms on
}

# Lock screen after 3 minutes of inactivity
listener {
  timeout    = 180
  on-timeout = hyprlock
  on-resume  = hyprctl dispatch dpms on
}

# Turn off displays shortly after locking (lets hyprlock draw first)
listener {
  timeout    = 182
  on-timeout = hyprctl dispatch dpms off
  on-resume  = hyprctl dispatch dpms on
}
