# -----------------------------------------------------
# Key bindings
# name: "Default"
# -----------------------------------------------------

# Variables
$mainMod = SUPER
$HYPRSCRIPTS = $SCRIPTS
$SCRIPTS = ~/.config/ml4w/scripts

# Applications
bind = $mainMod, RETURN, exec, kitty # Open the terminal
bind = $mainMod, B, exec, brave # Open the browser
bind = $mainMod, E, exec, thunar # Open the filemanager
bind = $mainMod SHIFT, V, exec, flatpak run dev.krtirtho.Flemozi # Open the emoji picker
bind = $mainMod CTRL, C, exec, gnome-calculator # Open the calculator

# Display
bind = $mainMod SHIFT, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}") # Increase display zoom
bind = $mainMod SHIFT, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}") # Decrease display zoom
bind = $mainMod SHIFT, Z, exec, hyprctl keyword cursor:zoom_factor 0 # Reset display zoom

# Windows
bind = $mainMod, Q, killactive # Kill active window
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill # Quit active window and all open instances
bind = $mainMod, F, fullscreen, 0 # Set active window to fullscreen
bind = $mainMod, M, fullscreen, 1 # Maximize Window
bind = $mainMod, T, togglefloating # Toggle active windows into floating mode
bind = $mainMod SHIFT, T, workspaceopt, allfloat # Toggle all windows into floating mode
bind = $mainMod, J, togglesplit # Toggle split
bind = $mainMod, P, pseudo # Toggle dwindle pseudo mode
bindm = $mainMod, mouse:272, movewindow # Move window with the mouse
bindm = $mainMod, mouse:273, resizewindow # Resize window with the mouse
bind = $mainMod, left, movefocus, l # Move focus left
bind = $mainMod, right, movefocus, r # Move focus right
bind = $mainMod, up, movefocus, u # Move focus up
bind = $mainMod, down, movefocus, d # Move focus down
bind = $mainMod SHIFT, right, resizeactive, 100 0 # Increase window width with keyboard
bind = $mainMod SHIFT, left, resizeactive, -100 0 # Reduce window width with keyboard
bind = $mainMod SHIFT, down, resizeactive, 0 100 # Increase window height with keyboard
bind = $mainMod SHIFT, up, resizeactive, 0 -100 # Reduce window height with keyboard
bind = $mainMod CTRL, right, moveactive, 100 0 # Move window right with keyboard
bind = $mainMod CTRL, left, moveactive, -100 0 # Move window left with keyboard
bind = $mainMod CTRL, down, moveactive, 0 100 # Move window down with keyboard
bind = $mainMod CTRL, up, moveactive, 0 -100 # Move window up with keyboard
bind = $mainMod, G, togglegroup # Toggle window group
bind = $mainMod, K, swapsplit # Swapsplit
bind = $mainMod ALT, left, swapwindow, l # Swap tiled window left
bind = $mainMod ALT, right, swapwindow, r # Swap tiled window right
bind = $mainMod ALT, up, swapwindow, u # Swap tiled window up
bind = $mainMod ALT, down, swapwindow, d # Swap tiled window down
binde = ALT,Tab,cyclenext # Cycle between windows
binde = ALT,Tab,bringactivetotop # Bring active window to the top

# Actions
bind = $mainMod CTRL, R, exec, hyprctl reload # Reload Hyprland configuration
bind = $mainMod SHIFT, A, exec, $HYPRSCRIPTS/toggle-animations.sh # Toggle animations
bind = $mainMod, PRINT, exec, $HYPRSCRIPTS/screenshot.sh # Take a screenshot
bind = $mainMod ALT, F, exec, $HYPRSCRIPTS/screenshot.sh --instant # Take an instant full-screen screenshot
bind = $mainMod ALT, S, exec, $HYPRSCRIPTS/screenshot.sh --instant-area # Take an instant area screenshot
bind = $mainMod CTRL, Q, exec, ~/.config/ml4w/scripts/wlogout.sh # Start wlogout
bind = $mainMod SHIFT, W, exec, waypaper --random # Change the wallpaper
bind = $mainMod CTRL, W, exec, waypaper # Open wallpaper selector
bind = $mainMod ALT, W, exec, $HYPRSCRIPTS/wallpaper-automation.sh # Start random wallpaper script
bind = $mainMod CTRL, RETURN, exec, pkill rofi || rofi -show drun -replace -i # Open application launcher
bind = $mainMod CTRL, K, exec, $HYPRSCRIPTS/keybindings.sh # Show keybindings
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh # Reload waybar
bind = $mainMod CTRL, B, exec, ~/.config/waybar/toggle.sh # Toggle waybar
bind = $mainMod SHIFT, R, exec, $HYPRSCRIPTS/loadconfig.sh # Reload hyprland config
bind = $mainMod, V, exec, $SCRIPTS/cliphist.sh # Open clipboard manager
bind = $mainMod CTRL, T, exec, ~/.config/waybar/themeswitcher.sh # Open waybar theme switcher
bind = $mainMod CTRL, S, exec, flatpak run com.ml4w.settings # Open ML4W Dotfiles Settings app
bind = $mainMod ALT, G, exec, $HYPRSCRIPTS/gamemode.sh # Toggle game mode
bind = $mainMod CTRL, L, exec, ~/.config/hypr/scripts/power.sh lock # Start wlogout
bind = $mainMod, ESCAPE, exec, $SCRIPTS/wpctl-cycle-sink.sh

# Per-monitor local workspaces on number row
bind = $mainMod, 1, exec, $SCRIPTS/workspace-local.sh 1
bind = $mainMod, 2, exec, $SCRIPTS/workspace-local.sh 2
bind = $mainMod, 3, exec, $SCRIPTS/workspace-local.sh 3
bind = $mainMod, 4, exec, $SCRIPTS/workspace-local.sh 4
bind = $mainMod, 5, exec, $SCRIPTS/workspace-local.sh 5
bind = $mainMod, 6, exec, $SCRIPTS/workspace-local.sh 6
bind = $mainMod, 7, exec, $SCRIPTS/workspace-local.sh 7
bind = $mainMod, 8, exec, $SCRIPTS/workspace-local.sh 8
bind = $mainMod, 9, exec, $SCRIPTS/workspace-local.sh 9

# Move active window to local N (Super+Shift+N)
bind = $mainMod SHIFT, 1, exec, $SCRIPTS/workspace-local-move.sh 1
bind = $mainMod SHIFT, 2, exec, $SCRIPTS/workspace-local-move.sh 2
bind = $mainMod SHIFT, 3, exec, $SCRIPTS/workspace-local-move.sh 3
bind = $mainMod SHIFT, 4, exec, $SCRIPTS/workspace-local-move.sh 4
bind = $mainMod SHIFT, 5, exec, $SCRIPTS/workspace-local-move.sh 5
bind = $mainMod SHIFT, 6, exec, $SCRIPTS/workspace-local-move.sh 6
bind = $mainMod SHIFT, 7, exec, $SCRIPTS/workspace-local-move.sh 7
bind = $mainMod SHIFT, 8, exec, $SCRIPTS/workspace-local-move.sh 8
bind = $mainMod SHIFT, 9, exec, $SCRIPTS/workspace-local-move.sh 9

# Move all windows to local N (Super+Ctrl+N)
bind = $mainMod CTRL, 1, exec, $SCRIPTS/workspace-local-moveall.sh 1
bind = $mainMod CTRL, 2, exec, $SCRIPTS/workspace-local-moveall.sh 2
bind = $mainMod CTRL, 3, exec, $SCRIPTS/workspace-local-moveall.sh 3
bind = $mainMod CTRL, 4, exec, $SCRIPTS/workspace-local-moveall.sh 4
bind = $mainMod CTRL, 5, exec, $SCRIPTS/workspace-local-moveall.sh 5
bind = $mainMod CTRL, 6, exec, $SCRIPTS/workspace-local-moveall.sh 6
bind = $mainMod CTRL, 7, exec, $SCRIPTS/workspace-local-moveall.sh 7
bind = $mainMod CTRL, 8, exec, $SCRIPTS/workspace-local-moveall.sh 8
bind = $mainMod CTRL, 9, exec, $SCRIPTS/workspace-local-moveall.sh 9

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# Workspace cycling. [script] [gap|max] [up|down]. Gap will create the next minimum index workspace while max will just take last + 1.
# Max is generally preferable for a smooth workflow, but gap is here for those with OCD.
bind = $mainMod, Tab, exec, $SCRIPTS/workspace-cycle-smart.sh max up # Cycle to next existing workspace on focused monitor
bind = $mainMod SHIFT, Tab, exec, $SCRIPTS/workspace-cycle-smart.sh max down # Cycle to previous workspace on focused monitor

# bind = $mainMod, Tab, exec, hyprctl dispatch workspace r+1
# bind = $mainMod SHIFT, Tab, exec, hyprctl dispatch workspace r-1
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1
# bind = $mainMod CTRL, down, workspace, empty

# Fn keys
# bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+ # Increase volume by 5% (max 100% limit also added hold to raise volume)
# bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- # Reduce volume by 5% (min 0% limit also added hold to lower volume)
bind = , XF86AudioPlay, exec, playerctl play-pause # Audio play pause
bind = , XF86AudioPause, exec, playerctl pause  # Audio pause
bind = , XF86AudioNext, exec, playerctl next # Audio next
bind = , XF86AudioPrev, exec, playerctl previous # Audio previous
# bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle # Toggle audio mute
# bind = $mainMod, XF86AudioMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle # Toggle microphone mute

# https://github.com/ErikReider/SwayOSD

# Output Volume
bind = ,XF86AudioRaiseVolume, exec,swayosd-client --output-volume raise --max-volume 100
bind = ,XF86AudioLowerVolume, exec,swayosd-client --output-volume lower --max-volume 100
bind = ,XF86AudioMute, exec,swayosd-client --output-volume mute-toggle

# Input Volume
bind = $mainMod, XF86AudioRaiseVolume, exec, swayosd-client --input-volume raise --max-volume 100
bind = $mainMod, XF86AudioLowerVolume, exec, swayosd-client --input-volume lower --max-volume 100
bind = $mainMod, XF86AudioMute, exec, swayosd-client --input-volume mute-toggle

# Brightness
bind = $mainMod SHIFT, XF86AudioRaiseVolume, exec, swayosd-client --brightness +10
bind = $mainMod SHIFT, XF86AudioLowerVolume, exec, swayosd-client --brightness -10

bind = CAPS, Caps_Lock, exec, swayosd-client --caps-lock