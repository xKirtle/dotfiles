# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us,pt
    kb_variant =
    kb_model =
    kb_options = grp:lalt_lshift_toggle
    kb_rules = 

    follow_mouse = 1

    sensitivity = -0.5 # -1.0 - 1.0, 0 means no modification.
    force_no_accel = true

    touchpad {
        natural_scroll = false
    }
}